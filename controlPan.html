<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logitech 웹소켓 패널 ⚡</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 30px; background-color: #f0f0f0;">

    <h1>로컬 로지텍 패널 🕹️</h1>
    <h3 id="status" style="color: red;">상태: 연결 끊김 🔴</h3>
    <div>
    <label id="ip" style="display:block"></label>
    <input id="my-ip" type="text" style="margin: 10px" value="192.168.45.248">
    </div>
    <div style="display: flex; margin:5px; padding:30px;">
      <button id="btnA" style="padding:30px 50px; background:black; color:lime; font-size:24px; border-radius:15px; font-weight:bold; margin-bottom:20px; width:80%; user-select:none;">A 키 누르기</button>
      <button id="btna" style="padding:30px 50px; background:black; color:lime; font-size:24px; border-radius:15px; font-weight:bold; margin-bottom:20px; width:80%; user-select:none;">A 키 떼기</button>
    </div>
    
    <button id="btnConnect" style="padding:15px 25px; background:green; color:white; font-size:16px; border-radius:8px; margin:5px;">소켓 연결하기</button>
    <button id="btnDisconnect" style="padding:15px 25px; background:red; color:white; font-size:16px; border-radius:8px; margin:5px;">소켓 연결 끊기</button>
    <div id="logConsole" style="width: 80%; height: 150px; margin: 20px auto; background: #000; color: #0f0; padding: 10px; border-radius: 10px; text-align: left; font-family: monospace; overflow-y: auto; font-size: 14px;">
        [시스템] 보드의 신호를 기다리는 중...
    </div>

    <script>
        var ws = null;
        var statusText = document.getElementById('status');
        let refreshTimer;
        // 💥 [필수 변경] 시리얼 모니터에 뜨는 보드 IP 주소를 여기에 정확히 적어주세요!
        var logConsole = document.getElementById('logConsole'); // 로그 창 가져오기
        function connect() {
            if (ws !== null) return;
            // 파일로 실행하기 때문에 window.location.hostname 대신 고정 IP를 꽂아줍니다!
            var boardIP = document.getElementById("my-ip").value;
            document.getElementById("ip").innerText = boardIP;
            
            ws = new WebSocket('ws://' + boardIP + ':81/');
            
            ws.onopen = function() { 
                statusText.innerText = '상태: 연결 성공! 🟢'; 
                statusText.style.color = 'green'; 
            };
            ws.onmessage = function(event) {
                // 새 로그를 콘솔 창 맨 위에 한 줄씩 추가합니다.
                logConsole.innerHTML = "<div>" + event.data + "</div>" + logConsole.innerHTML;
            };
            
            ws.onclose = function() { 
                statusText.innerText = '상태: 연결 끊김 🔴'; 
                statusText.style.color = 'red'; 
                ws = null; 
            };
            ws.onerror = function(e) { if(ws) ws.close(); };
        }
        
        function sendRefresh() {
            if (ws == null) return;
            // 40초 ~ 60초 사이의 랜덤 시간 생성 (단위: 밀리초)
            const randomInterval = Math.floor(Math.random() * (60000 - 40000 + 1) + 40000);
            
            logConsole.innerHTML = "<div>" + `다음 리프레시까지 대기 시간: ${randomInterval / 1000}초` + "</div>" + logConsole.innerHTML;
            
            // 웹소켓으로 신호 전송
            ws.send("a");
            
            const randomInterval2 = Math.floor(Math.random() * (1000 - 300 + 1) + 300);
            logConsole.innerHTML = "<div>" + `다음 A입력까지: ${randomInterval2 / 1000}초` + "</div>" + logConsole.innerHTML;
            setTimeout(() => ws.send("A"), randomInterval2);
            // 랜덤 시간이 지난 후 다시 자기 자신을 호출 (재귀 호출)
            refreshTimer = setTimeout(sendRefresh, randomInterval);
        }

        function disconnect() {
            if (ws !== null) {
                ws.onopen = null; ws.onclose = null; ws.onerror = null;
                ws.close(); ws = null;
                statusText.innerText = '상태: 연결 끊김 🔴'; 
                statusText.style.color = 'red';
            }
        }

        document.getElementById('btnConnect').onclick = connect;
        document.getElementById('btnDisconnect').onclick = disconnect;

        document.getElementById('btnA').onclick = function() {
            if(ws && ws.readyState === 1) { 
                const randomInterval = Math.floor(Math.random() * (60000 - 40000 + 1) + 40000);
                ws.send('A'); 
                logConsole.innerHTML = "<div>" + `다음 리프레시까지 대기 시간: ${randomInterval / 1000}초` + "</div>" + logConsole.innerHTML;
                refreshTimer = setTimeout(sendRefresh, randomInterval);
            } else { 
                alert('먼저 소켓을 연결해주세요!'); 
            }
        };
        document.getElementById('btna').onclick = function() {
            if(ws && ws.readyState === 1) { 
                ws.send('a'); 
                clearTimeout(refreshTimer);
            } else { 
                alert('먼저 소켓을 연결해주세요!'); 
            }
        };
        
        // 파일 열자마자 자동 연결 시도
        connect();
    </script>
</body>
</html>
